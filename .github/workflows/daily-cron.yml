name: Daily Email Cron
on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch: {}  # Manual trigger

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Check expiring subscriptions
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/check-subscriptions" \
            || echo "Warning: check-subscriptions failed"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Check inactive users
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/inactive-users" \
            || echo "Warning: inactive-users failed"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
